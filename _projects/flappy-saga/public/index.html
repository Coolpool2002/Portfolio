<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>Flappy Ball 2 - Menu</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #1e1e1e;
      color: #fff;
      text-align: center;
      padding: 40px;
    }
    input, button {
      margin: 6px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
    }
    #menu, #game, #loginView, #registerView, #userListView, #recordView,
    #shopView, #customizeView, #backgroundsView, #skinsView {
      display: none;
    }
    .section {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- Login View -->
  <div id="loginView">
    <h2>Login</h2>
    <input id="loginUsername" placeholder="Username"><br>
    <input id="loginPassword" type="password" placeholder="Password"><br>
    <button id="loginButton">Login</button>
    <br>
    <a href="#" id="showRegisterLink">Register</a> | 
    <a href="#" id="guestLink">Continue as Guest</a>
  </div>
  <!-- Register View -->
  <div id="registerView">
    <h2>Register</h2>
    <input id="registerUsername" placeholder="Username"><br>
    <input id="registerPassword" type="password" placeholder="Password"><br>
    <button id="registerButton">Register</button>
    <br>
    <a href="#" id="showLoginLink">Back to Login</a>
  </div>
  <!-- Main Menu -->
  <div id="menu">
    <h1>Welcome, <span id="currentUser"></span></h1>
    <div class="section">
      <button id="startGameButton">Play</button>
      <button id="manageUsersButton">Manage Users</button>
      <button id="viewRecordsButton">View Records</button>
    </div>
    <div class="section">
      <button id="customizeButton">Customize</button>
      <button id="shopButton">Shop</button>
    </div>
    <div class="section">
      <button id="logoutButton">Logout</button>
    </div>
  </div>
  <!-- Shop View -->
  <div id="shopView">
    <h2>Shop</h2>
    <p id="pointsDisplay">Points: 0</p>
    <button onclick="buyBackground('forest', 100)">Buy Forest (100 pts)</button>
    <button onclick="buyBackground('night', 200)">Buy Night (200 pts)</button>
    <br><br>
    <button id="backFromShopButton">Back</button>
  </div>
  <!-- Customize View -->
  <div id="customizeView">
    <h2>Customize</h2>
    <button id="backgroundsButton">Backgrounds</button>
    <button id="skinsButton">Skins</button>
    <br><br>
    <button id="backFromCustomizeButton">Back</button>
  </div>
  <!-- Backgrounds View -->
  <div id="backgroundsView">
    <h3>Choose Background</h3>
    <button onclick="selectBackground('sky')">Sky</button>
    <button onclick="selectBackground('forest')">Forest</button>
    <button onclick="selectBackground('night')">Night</button>
    <br><br>
    <button id="backFromBackgroundsButton">Back</button>
  </div>
  <!-- Skins View -->
  <div id="skinsView">
    <h3>Choose Skin</h3>
    <button onclick="selectSkin('yellow')">Yellow</button>
    <button onclick="selectSkin('blue')">Blue</button>
    <button onclick="selectSkin('red')">Red</button>
    <br><br>
    <button id="backFromSkinsButton">Back</button>
  </div>
  <!-- User List View -->
  <div id="userListView">
    <h2>User List</h2>
    <div id="userList"></div>
    <button id="backFromUsersButton">Back</button>
  </div>
  <!-- Record View -->
  <div id="recordView">
    <h2>Records</h2>
    <div id="recordList"></div>
    <button id="backFromRecordsButton">Back</button>
  </div>
  <!-- Game Canvas -->
  <canvas id="game" width="400" height="600"></canvas>
  <script type="module">
    // User management
    const users = { admin: "admin123" };
    let currentUser = null;
    let userPoints = {}; // Keep points per user

    // Views
    const loginView = document.getElementById("loginView");
    const registerView = document.getElementById("registerView");
    const menu = document.getElementById("menu");
    const userListView = document.getElementById("userListView");
    const userList = document.getElementById("userList");
    const gameCanvas = document.getElementById("game");
    const ctx = gameCanvas.getContext("2d");
    const recordView = document.getElementById("recordView");
    const recordList = document.getElementById("recordList");

    // Hide all views
    function hideAllViews() {
      loginView.style.display = "none";
      registerView.style.display = "none";
      menu.style.display = "none";
      userListView.style.display = "none";
      recordView.style.display = "none";
      gameCanvas.style.display = "none";
      document.getElementById("shopView").style.display = "none";
      document.getElementById("customizeView").style.display = "none";
      document.getElementById("backgroundsView").style.display = "none";
      document.getElementById("skinsView").style.display = "none";
    }

    function showLogin() {
      hideAllViews();
      loginView.style.display = "block";
    }
    function showRegister() {
      hideAllViews();
      registerView.style.display = "block";
    }
    function showMenu() {
      hideAllViews();
      document.getElementById("currentUser").textContent = currentUser || "Guest";
      menu.style.display = "block";
    }

    // Login/Register logic
    document.getElementById("loginButton").onclick = () => {
      const user = document.getElementById("loginUsername").value;
      const pass = document.getElementById("loginPassword").value;
      if (users[user] === pass) {
        currentUser = user;
        showMenu();
      } else {
        alert("Incorrect login.");
      }
    };
    document.getElementById("registerButton").onclick = () => {
      const user = document.getElementById("registerUsername").value;
      const pass = document.getElementById("registerPassword").value;
      if (user && pass && !users[user]) {
        users[user] = pass;
        alert("Account created!");
        showLogin();
      } else {
        alert("Invalid input or user exists.");
      }
    };
    document.getElementById("guestLink").onclick = (e) => {
      e.preventDefault();
      currentUser = "Guest";
      showMenu();
    };
    document.getElementById("showRegisterLink").onclick = (e) => {
      e.preventDefault();
      showRegister();
    };
    document.getElementById("showLoginLink").onclick = (e) => {
      e.preventDefault();
      showLogin();
    };
    document.getElementById("logoutButton").onclick = () => {
      currentUser = null;
      showLogin();
    };

    // Main menu
    document.getElementById("startGameButton").onclick = () => startGame();
    document.getElementById("manageUsersButton").onclick = () => showUsers();
    document.getElementById("viewRecordsButton").onclick = () => showRecords();
    document.getElementById("backFromUsersButton").onclick = () => showMenu();
    document.getElementById("backFromRecordsButton").onclick = () => showMenu();

    // SHOP & CUSTOMIZE
    document.getElementById("customizeButton").onclick = () => {
      hideAllViews();
      document.getElementById("customizeView").style.display = "block";
    };
    document.getElementById("shopButton").onclick = () => {
      hideAllViews();
      document.getElementById("shopView").style.display = "block";
      updatePointsDisplay();
    };
    document.getElementById("backgroundsButton").onclick = () => {
      hideAllViews();
      document.getElementById("backgroundsView").style.display = "block";
    };
    document.getElementById("skinsButton").onclick = () => {
      hideAllViews();
      document.getElementById("skinsView").style.display = "block";
    };
    document.getElementById("backFromCustomizeButton").onclick = () => showMenu();
    document.getElementById("backFromBackgroundsButton").onclick = () => {
      hideAllViews();
      document.getElementById("customizeView").style.display = "block";
    };
    document.getElementById("backFromSkinsButton").onclick = () => {
      hideAllViews();
      document.getElementById("customizeView").style.display = "block";
    };
    document.getElementById("backFromShopButton").onclick = () => showMenu();

    // User List
    function showUsers() {
      hideAllViews();
      userList.innerHTML = "";
      Object.keys(users).forEach(user => {
        const div = document.createElement("div");
        div.style.textAlign = "center";
        div.style.marginBottom = "10px";
        const span = document.createElement("span");
        span.textContent = user;
        span.style.display = "inline-block";
        span.style.width = "200px";
        span.style.color = "white";
        div.appendChild(span);
        if (currentUser === "admin") {
          const delBtn = document.createElement("button");
          delBtn.textContent = "Delete";
          delBtn.disabled = user === "admin";
          delBtn.addEventListener("click", () => deleteUser(user));
          div.appendChild(delBtn);
        }
        userList.appendChild(div);
      });
      userListView.style.display = "block";
    }
    function deleteUser(username) {
      if (currentUser !== "admin") return alert("Only admin can delete users.");
      if (username === "admin") return;
      if (confirm(`Delete '${username}'?`)) {
        delete users[username];
        showUsers();
      }
    }

    // Records (dummy)
    window.loadTopScores = async () => [
      { name: "admin", score: 42 },
      { name: "Guest", score: 12 }
    ];
    async function showRecords() {
      hideAllViews();
      recordView.style.display = "block";
      recordList.innerHTML = "Loading...";
      const scores = await window.loadTopScores();
      recordList.innerHTML = "";
      if (scores.length === 0) {
        recordList.innerHTML = "No records found.";
      } else {
        scores.forEach(r => {
          const div = document.createElement("div");
          div.textContent = `${r.name}: ${r.score} points`;
          recordList.appendChild(div);
        });
      }
    }

    // Game + Customization
    let selectedBackground = "sky";
    let selectedSkin = "yellow";
    function selectBackground(type) {
      selectedBackground = type;
      alert("Background set to " + type);
    }
    function selectSkin(color) {
      selectedSkin = color;
      alert("Skin set to " + color);
    }

    // Shop logic
    function updatePointsDisplay() {
      document.getElementById("pointsDisplay").innerText = 
        "Points: " + (userPoints[currentUser] || 0);
    }
    window.buyBackground = function(type, cost) {
      if (!userPoints[currentUser] || userPoints[currentUser] < cost) {
        alert("Not enough points!");
        return;
      }
      userPoints[currentUser] -= cost;
      alert("You bought the " + type + " background!");
      updatePointsDisplay();
    };

    // Game logic
    function updateUserPoints(points) {
      if (!userPoints[currentUser]) userPoints[currentUser] = 0;
      userPoints[currentUser] += points;
    }
    window.saveScore = function(user, score) {
      // Dummy: In a real app, this would save to a server/localStorage
    };

    function startGame() {
      hideAllViews();
      gameCanvas.style.display = "block";
      runGame();
    }

    function runGame() {
      let y = 200;
      let velocity = 0;
      const gravity = 0.15;
      const flapStrength = -4;
      let score = 0;
      const pipes = [];
      const gap = 150;
      let frame = 0;
      let redDot = null;
      const flap = () => { velocity = flapStrength; };
      window.removeEventListener("keydown", flap);
      window.addEventListener("keydown", flap);
      const scoreInterval = setInterval(() => score++, 1000);

      function drawBackground(ctx) {
        switch (selectedBackground) {
          case "forest": ctx.fillStyle = "#228B22"; break;
          case "night": ctx.fillStyle = "#0a0a40"; break;
          default: ctx.fillStyle = "skyblue";
        }
        ctx.fillRect(0, 0, 400, 600);
      }

      function draw() {
        frame++;
        ctx.clearRect(0, 0, 400, 600);
        drawBackground(ctx);

        // Ball (skin color)
        ctx.fillStyle = selectedSkin;
        ctx.beginPath();
        ctx.arc(100, y, 20, 0, Math.PI * 2);
        ctx.fill();

        velocity += gravity;
        y += velocity;
        if (y > 580 || y < 0) return gameOver();

        // Pipes
        if (frame % 90 === 0) {
          const topHeight = Math.floor(Math.random() * 200) + 50;
          pipes.push({ x: 400, top: topHeight, bottom: topHeight + gap });
          if (pipes.length % 10 === 0) redDot = { x: 425, y: topHeight + gap / 2, collected: false };
        }
        ctx.fillStyle = "green";
        for (let pipe of pipes) {
          pipe.x -= 2;
          ctx.fillRect(pipe.x, 0, 50, pipe.top);
          ctx.fillRect(pipe.x, pipe.bottom, 50, 600 - pipe.bottom);

          if (
            100 + 20 > pipe.x &&
            100 - 20 < pipe.x + 50 &&
            (y - 20 < pipe.top || y + 20 > pipe.bottom)
          ) return gameOver();
        }

        // Red dot
        if (redDot && !redDot.collected) {
          redDot.x -= 2;
          ctx.fillStyle = "red";
          ctx.beginPath();
          ctx.arc(redDot.x, redDot.y, 14, 0, Math.PI * 2);
          ctx.fill();

          if (Math.abs(redDot.x - 100) < 25 && Math.abs(redDot.y - y) < 25) {
            score += 5;
            redDot.collected = true;
          }
          if (redDot.x < -10) redDot = null;
        }

        // Score
        ctx.fillStyle = "black";
        ctx.font = "16px Arial";
        ctx.fillText("SCORE: " + score + " points", 10, 20);
        requestAnimationFrame(draw);
      }

      function gameOver() {
        clearInterval(scoreInterval);
        window.removeEventListener("keydown", flap);
        window.saveScore(currentUser, score);
        updateUserPoints(score);
        alert("Game Over! You earned: " + score + " points");
        showMenu();
      }

      draw();
    }

    // Boot
    showLogin();
  </script>
</body>
</html>
