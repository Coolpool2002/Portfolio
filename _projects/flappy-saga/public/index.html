<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Management + Flappy Bird</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #1e1e1e;
      color: #f5f5f5;
      text-align: center;
      padding: 40px;
    }
    input, button {
      margin: 5px;
      padding: 10px;
      font-size: 1rem;
    }
    #menu, #game, #loginView, #registerView, #userListView, #recordView {
      display: none;
    }
  </style>
</head>
<body>
  <!-- UI Views -->
  <div id="loginView">
    <h1>Login</h1>
    <input type="text" id="loginUsername" placeholder="Username"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button id="loginButton">Login</button>
    <p>Don't have an account? <a href="#" id="showRegisterLink">Register here</a></p>
    <p><a href="#" id="guestLink">Sign in as Guest</a></p>
  </div>

  <div id="registerView">
    <h1>Register</h1>
    <input type="text" id="registerUsername" placeholder="Username"><br>
    <input type="password" id="registerPassword" placeholder="Password"><br>
    <button id="registerButton">Register</button>
    <p>Already have an account? <a href="#" id="showLoginLink">Login</a></p>
  </div>

  <div id="menu">
    <h1>Welcome, <span id="currentUser"></span></h1>
    <button id="startGameButton">Play Flappy Ball 2</button>
    <button id="manageUsersButton">Manage Users</button>
    <button id="viewRecordsButton">View Records</button>
    <button id="logoutButton">Logout</button>
  </div>

  <div id="userListView">
    <h2>All Users</h2>
    <div id="userList"></div>
    <button id="backFromUsersButton">Back</button>
  </div>

  <div id="recordView">
    <h2>All Scores</h2>
    <div id="recordList"></div>
    <button id="backFromRecordsButton">Back</button>
  </div>

  <canvas id="game" width="400" height="600"></canvas>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAytbPQR5h8w8YmR-zo-xpBNn6lYlVmZjk",
      authDomain: "flappy-ball-2-leaderboard.firebaseapp.com",
      projectId: "flappy-ball-2-leaderboard",
      storageBucket: "flappy-ball-2-leaderboard.appspot.com",
      messagingSenderId: "678584043682",
      appId: "1:678584043682:web:869514b82e6b4676c82ffb",
      measurementId: "G-6MDV8B1CCP",
      databaseURL: "https://flappy-ball-2-leaderboard-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.saveScore = async (name, score) => {
      try {
        if (typeof name !== "string" || name.trim() === "") throw new Error("Invalid name");
        if (typeof score !== "number" || isNaN(score) || score < 0) throw new Error("Invalid score");

        const scoresRef = ref(db, "scores");
        const newScoreRef = push(scoresRef);
        await set(newScoreRef, {
          name: name.trim(),
          score,
          timestamp: Date.now()
        });
      } catch (e) {
        console.error("Failed to save score:", e);
      }
    };

    window.loadTopScores = async () => {
      try {
        const scoresRef = ref(db, "scores");
        const snapshot = await get(scoresRef);
        if (!snapshot.exists()) return [];

        const raw = snapshot.val();
        const scores = Object.keys(raw).map(key => raw[key]);

        const validScores = scores.filter(s =>
          typeof s.score === "number" &&
          typeof s.name === "string" &&
          s.name.trim().length > 0
        );

        return validScores.sort((a, b) => b.score - a.score).slice(0, 10);
      } catch (e) {
        console.error("Failed to load scores:", e);
        return [];
      }
    };

    // Optional: Cleanup function to remove malformed entries
    async function cleanBadScores() {
      const snapshot = await get(ref(db, "scores"));
      if (!snapshot.exists()) return;
      const raw = snapshot.val();
      for (let key in raw) {
        const { name, score } = raw[key];
        if (typeof name !== "string" || typeof score !== "number") {
          await remove(ref(db, `scores/${key}`));
        }
      }
    }

    const users = { admin: "admin123" };
    let currentUser = null;

    const loginView = document.getElementById("loginView");
    const registerView = document.getElementById("registerView");
    const menu = document.getElementById("menu");
    const userListView = document.getElementById("userListView");
    const userList = document.getElementById("userList");
    const gameCanvas = document.getElementById("game");
    const ctx = gameCanvas.getContext("2d");
    const recordView = document.getElementById("recordView");
    const recordList = document.getElementById("recordList");

    function showLogin() {
      loginView.style.display = "block";
      registerView.style.display = "none";
      menu.style.display = "none";
      gameCanvas.style.display = "none";
      userListView.style.display = "none";
      recordView.style.display = "none";
    }

    function showRegister() {
      loginView.style.display = "none";
      registerView.style.display = "block";
      menu.style.display = "none";
      gameCanvas.style.display = "none";
      userListView.style.display = "none";
      recordView.style.display = "none";
    }

    function showMenu() {
      document.getElementById("currentUser").textContent = currentUser || "Guest";
      loginView.style.display = "none";
      registerView.style.display = "none";
      menu.style.display = "block";
      gameCanvas.style.display = "none";
      userListView.style.display = "none";
      recordView.style.display = "none";
    }

    document.getElementById("loginButton").onclick = () => {
      const user = document.getElementById("loginUsername").value;
      const pass = document.getElementById("loginPassword").value;
      if (users[user] === pass) {
        currentUser = user;
        showMenu();
      } else {
        alert("Incorrect login.");
      }
    };

    document.getElementById("registerButton").onclick = () => {
      const user = document.getElementById("registerUsername").value;
      const pass = document.getElementById("registerPassword").value;
      if (user && pass && !users[user]) {
        users[user] = pass;
        alert("Account created!");
        showLogin();
      } else {
        alert("Invalid input or user exists.");
      }
    };

    document.getElementById("guestLink").onclick = (e) => {
      e.preventDefault();
      currentUser = "Guest";
      showMenu();
    };

    document.getElementById("showRegisterLink").onclick = (e) => {
      e.preventDefault();
      showRegister();
    };

    document.getElementById("showLoginLink").onclick = (e) => {
      e.preventDefault();
      showLogin();
    };

    document.getElementById("logoutButton").onclick = () => {
      currentUser = null;
      showLogin();
    };

    document.getElementById("startGameButton").onclick = () => startGame();
    document.getElementById("manageUsersButton").onclick = () => showUsers();
    document.getElementById("viewRecordsButton").onclick = () => showRecords();
    document.getElementById("backFromUsersButton").onclick = () => showMenu();
    document.getElementById("backFromRecordsButton").onclick = () => showMenu();

    function showUsers() {
      userList.innerHTML = "";
      Object.keys(users).forEach(user => {
        const div = document.createElement("div");
        div.style.textAlign = "center";
        div.style.marginBottom = "10px";

        const span = document.createElement("span");
        span.textContent = user;
        span.style.display = "inline-block";
        span.style.width = "200px";
        span.style.color = "white";
        div.appendChild(span);

        if (currentUser === "admin") {
          const delBtn = document.createElement("button");
          delBtn.textContent = "Delete";
          delBtn.disabled = user === "admin";
          delBtn.addEventListener("click", () => deleteUser(user));
          div.appendChild(delBtn);
        }

        userList.appendChild(div);
      });
      menu.style.display = "none";
      userListView.style.display = "block";
    }

    function deleteUser(username) {
      if (currentUser !== "admin") return alert("Only admin can delete users.");
      if (username === "admin") return;
      if (confirm(`Delete '${username}'?`)) {
        delete users[username];
        showUsers();
      }
    }

    async function showRecords() {
      menu.style.display = "none";
      recordView.style.display = "block";
      recordList.innerHTML = "Loading...";
      const scores = await window.loadTopScores();
      recordList.innerHTML = "";
      if (scores.length === 0) {
        recordList.innerHTML = "No records found.";
      } else {
        scores.forEach(r => {
          const div = document.createElement("div");
          div.textContent = `${r.name}: ${r.score} points`;
          recordList.appendChild(div);
        });
      }
    }

    function startGame() {
      menu.style.display = "none";
      gameCanvas.style.display = "block";
      runGame();
    }

    function runGame() {
      let y = 200;
      let velocity = 0;
      const gravity = 0.15;
      const flapStrength = -4;
      let score = 0;
      const pipes = [];
      const gap = 150;
      let frame = 0;
      let redDot = null;

      const flap = () => { velocity = flapStrength; };
      window.removeEventListener("keydown", flap);
      window.addEventListener("keydown", flap);

      const scoreInterval = setInterval(() => score++, 1000);

      function draw() {
        frame++;
        ctx.clearRect(0, 0, 400, 600);
        ctx.fillStyle = "skyblue";
        ctx.fillRect(0, 0, 400, 600);

        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(100, y, 20, 0, Math.PI * 2);
        ctx.fill();

        velocity += gravity;
        y += velocity;

        if (y > 580 || y < 0) return gameOver();

        if (frame % 90 === 0) {
          const topHeight = Math.floor(Math.random() * 200) + 50;
          pipes.push({ x: 400, top: topHeight, bottom: topHeight + gap });
          if (pipes.length % 10 === 0) redDot = { x: 425, y: topHeight + gap / 2, collected: false };
        }

        ctx.fillStyle = "green";
        for (let pipe of pipes) {
          pipe.x -= 2;
          ctx.fillRect(pipe.x, 0, 50, pipe.top);
          ctx.fillRect(pipe.x, pipe.bottom, 50, 600 - pipe.bottom);

          if (
            100 + 20 > pipe.x &&
            100 - 20 < pipe.x + 50 &&
            (y - 20 < pipe.top || y + 20 > pipe.bottom)
          ) return gameOver();
        }

        if (redDot && !redDot.collected) {
          redDot.x -= 2;
          ctx.fillStyle = "red";
          ctx.beginPath();
          ctx.arc(redDot.x, redDot.y, 14, 0, Math.PI * 2);
          ctx.fill();

          if (Math.abs(redDot.x - 100) < 25 && Math.abs(redDot.y - y) < 25) {
            score += 5;
            redDot.collected = true;
          }
          if (redDot.x < -10) redDot = null;
        }

        ctx.fillStyle = "black";
        ctx.font = "16px Arial";
        ctx.fillText("SCORE: " + score + " points", 10, 20);
        requestAnimationFrame(draw);
      }

      function gameOver() {
        clearInterval(scoreInterval);
        window.removeEventListener("keydown", flap);
        window.saveScore(currentUser, score);
        alert("Game Over! You earned: " + score + " points");
        showMenu();
      }

      draw();
    }

    showLogin();
  </script>
</body>
</html>
