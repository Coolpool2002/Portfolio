<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Management + Flappy Bird</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #1e1e1e;
      color: #f5f5f5;
      text-align: center;
      padding: 40px;
    }
    input, button {
      margin: 5px;
      padding: 10px;
      font-size: 1rem;
    }
    #menu, #game, #loginView, #registerView, #userListView, #recordView {
      display: none;
    }
  </style>
</head>
<body>
  <div id="loginView">
    <h1>Login</h1>
    <input type="text" id="loginUsername" placeholder="Username"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p>Don't have an account? <a href="#" onclick="showRegister()">Register here</a></p>
    <p><a href="#" onclick="skipLogin()">Sign in as Guest</a></p>
  </div>

  <div id="registerView">
    <h1>Register</h1>
    <input type="text" id="registerUsername" placeholder="Username"><br>
    <input type="password" id="registerPassword" placeholder="Password"><br>
    <button onclick="register()">Register</button>
    <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
  </div>

  <div id="menu">
    <h1>Welcome, <span id="currentUser"></span></h1>
    <button onclick="startGame()">Play Flappy Ball 2</button>
    <button onclick="showUsers()">Manage Users</button>
    <button onclick="showRecords()">View Records</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="userListView">
    <h2>All Users</h2>
    <div id="userList"></div>
    <button onclick="showMenu()">Back</button>
  </div>

  <div id="recordView">
    <h2>All Scores</h2>
    <div id="recordList"></div>
    <button onclick="showMenu()">Back</button>
  </div>

  <canvas id="game" width="400" height="600"></canvas>

  <script>
    const users = {
      admin: "admin123"
    };
    let currentUser = null;
    const loginView = document.getElementById('loginView');
    const registerView = document.getElementById('registerView');
    const menu = document.getElementById('menu');
    const userListView = document.getElementById('userListView');
    const userList = document.getElementById('userList');
    const gameCanvas = document.getElementById('game');
    const ctx = gameCanvas.getContext('2d');
    const recordView = document.getElementById('recordView');
    const recordList = document.getElementById('recordList');

    function showLogin() {
      registerView.style.display = 'none';
      loginView.style.display = 'block';
      menu.style.display = 'none';
      gameCanvas.style.display = 'none';
      userListView.style.display = 'none';
      recordView.style.display = 'none';
    }

    function showRegister() {
      loginView.style.display = 'none';
      registerView.style.display = 'block';
      menu.style.display = 'none';
      gameCanvas.style.display = 'none';
      userListView.style.display = 'none';
      recordView.style.display = 'none';
    }

    function showMenu() {
      document.getElementById('currentUser').textContent = currentUser || "Guest";
      loginView.style.display = 'none';
      registerView.style.display = 'none';
      menu.style.display = 'block';
      gameCanvas.style.display = 'none';
      userListView.style.display = 'none';
      recordView.style.display = 'none';
    }

    function showUsers() {
      userList.innerHTML = '';
      Object.keys(users).forEach(function(user) {
        const div = document.createElement('div');
        div.style.textAlign = 'center';
        div.style.marginBottom = '10px';

        const span = document.createElement('span');
        span.textContent = user;
        span.style.display = 'inline-block';
        span.style.width = '200px';
        span.style.color = 'white';

        div.appendChild(span);

        if (currentUser === 'admin') {
          const delBtn = document.createElement('button');
          delBtn.textContent = 'Delete';
          delBtn.disabled = user === 'admin';
          delBtn.addEventListener('click', () => deleteUser(user));
          div.appendChild(delBtn);
        }

        userList.appendChild(div);
      });

      menu.style.display = 'none';
      userListView.style.display = 'block';
    }

    function deleteUser(username) {
      if (currentUser !== 'admin') {
        alert('Only admin can delete users.');
        return;
      }
      if (username === 'admin') return;
      if (confirm(`Are you sure you want to delete '${username}'?`)) {
        delete users[username];
        showUsers();
      }
    }

    async function showRecords() {
      recordList.innerHTML = '';
      const scores = await loadTopScores();
      scores.forEach(r => {
        const div = document.createElement('div');
        div.textContent = `${r.name}: ${r.score} points`;
        recordList.appendChild(div);
      });
      menu.style.display = 'none';
      recordView.style.display = 'block';
    }

    function register() {
      const user = document.getElementById('registerUsername').value;
      const pass = document.getElementById('registerPassword').value;
      if (user && pass && !users[user]) {
        users[user] = pass;
        alert('Account created!');
        document.getElementById('registerUsername').value = '';
        document.getElementById('registerPassword').value = '';
        showLogin();
      } else {
        alert('Invalid input or user exists.');
      }
    }

    function login() {
      const user = document.getElementById('loginUsername').value;
      const pass = document.getElementById('loginPassword').value;
      if (users[user] === pass) {
        currentUser = user;
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        showMenu();
      } else {
        alert('Incorrect login.');
      }
    }

    function skipLogin() {
      currentUser = "Guest";
      showMenu();
    }

    function logout() {
      currentUser = null;
      showLogin();
    }

    function startGame() {
      menu.style.display = 'none';
      gameCanvas.style.display = 'block';
      runGame();
    }

    function runGame() {
      let y = 200;
      let velocity = 0;
      const gravity = 0.15;
      const flapStrength = -4;
      let score = 0;
      const pipes = [];
      const gap = 150;
      let frame = 0;
      let redDot = null;

      function flap() {
        velocity = flapStrength;
      }

      window.addEventListener('keydown', flap);
      const scoreInterval = setInterval(() => score++, 1000);

      function draw() {
        frame++;
        ctx.clearRect(0, 0, 400, 600);
        ctx.fillStyle = 'skyblue';
        ctx.fillRect(0, 0, 400, 600);

        ctx.fillStyle = 'yellow';
        ctx.beginPath();
        ctx.arc(100, y, 20, 0, Math.PI * 2);
        ctx.fill();

        velocity += gravity;
        y += velocity;

        if (y > 580 || y < 0) {
          gameOver();
          return;
        }

        if (frame % 90 === 0) {
          const topHeight = Math.floor(Math.random() * 200) + 50;
          pipes.push({ x: 400, top: topHeight, bottom: topHeight + gap });
          if (pipes.length % 10 === 0) {
            redDot = { x: 425, y: topHeight + gap / 2, collected: false };
          }
        }

        ctx.fillStyle = 'green';
        for (let i = 0; i < pipes.length; i++) {
          pipes[i].x -= 2;
          ctx.fillRect(pipes[i].x, 0, 50, pipes[i].top);
          ctx.fillRect(pipes[i].x, pipes[i].bottom, 50, 600 - pipes[i].bottom);

          if (
            100 + 20 > pipes[i].x &&
            100 - 20 < pipes[i].x + 50 &&
            (y - 20 < pipes[i].top || y + 20 > pipes[i].bottom)
          ) {
            gameOver();
            return;
          }
        }

        if (redDot && !redDot.collected) {
          redDot.x -= 2;
          ctx.fillStyle = 'red';
          ctx.beginPath();
          ctx.arc(redDot.x, redDot.y, 14, 0, Math.PI * 2);
          ctx.fill();

          if (Math.abs(redDot.x - 100) < 25 && Math.abs(redDot.y - y) < 25) {
            score += 5;
            redDot.collected = true;
          }

          if (redDot.x < -10) redDot = null;
        }

        ctx.fillStyle = 'black';
        ctx.font = '16px Arial';
        ctx.fillText("SCORE: " + score + " points", 10, 20);
        requestAnimationFrame(draw);
      }

      function gameOver() {
        clearInterval(scoreInterval);
        saveScore(currentUser, score);
        alert('Game Over! You earned: ' + score + ' points');
        window.removeEventListener('keydown', flap);
        showMenu();
      }

      draw();
    }

    showLogin();
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, set, get, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAytbPQR5h8w8YmR-zo-xpBNn6lYlVmZjk",
      authDomain: "flappy-ball-2-leaderboard.firebaseapp.com",
      projectId: "flappy-ball-2-leaderboard",
      storageBucket: "flappy-ball-2-leaderboard.firebasestorage.app",
      messagingSenderId: "678584043682",
      appId: "1:678584043682:web:869514b82e6b4676c82ffb",
      measurementId: "G-6MDV8B1CCP",
      databaseURL: "https://flappy-ball-2-leaderboard-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.saveScore = async (name, score) => {
      const scoresRef = ref(db, "scores");
      const newScoreRef = push(scoresRef);
      await set(newScoreRef, {
        name,
        score,
        timestamp: Date.now()
      });
    };

    window.loadTopScores = async () => {
      const scoresQuery = query(ref(db, "scores"), orderByChild("score"), limitToLast(10));
      const snapshot = await get(scoresQuery);
      if (!snapshot.exists()) return [];
      const scores = Object.values(snapshot.val());
      return scores.sort((a, b) => b.score - a.score);
    };
  </script>
</body>
</html>
