# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: Hayden Jones – Portfolio

# Hero Section
name: Hayden
headline: Creative Hardware & Electronics Projects
description: >-
  Welcome to my portfolio. Here you’ll find a collection of hands-on engineering, electronics, and design projects demonstrating my skills in diagnostics, prototyping, and automation.

# Place your profile image in /assets/images/profile-image/folder and edit the file name
profile_image: ./assets/images/profile-image/avatar.jpeg

# Link your resume
# You can place your resume in assets/resume/{resume file.pdf} or add external link such as pdf saved in google drive 
resume-url: https://drive.google.com/file/d/13Z3duVzh-gguPU5r03oJVEE6rV9rd3DS/view?usp=sharing

# Set up external links - this will show up as small icons next to your name.
external-links:
  linkedin: hayden-jones-tech
  github: coolpool
  stackoverflow: haydenjones
  youtube: haydenmakes

# Skills Section - Add the list of your Skills by categories/tools. The indentation for each level needs to be precise. 
skills:
  - category: Electronics & Prototyping
    tools:
      - Arduino
      - Raspberry Pi
      - Soldering
      - Breadboarding
      - DC Electronics
      - Multimeters & Oscilloscopes

  - category: 3D Modeling & Fabrication
    tools:
      - FreeCAD
      - Fusion 360
      - Blender
      - FDM 3D Printing
      - Laser Cutting

  - category: Programming & Systems
    tools:
      - Python 3
      - Linux CLI
      - Bash Scripting
      - Git & GitHub
      - Basic Networking
      - System Configuration

  - category: Hardware Modding
    tools:
      - Custom Switch Integration
      - Enclosure Design
      - PCB Rework
      - Cable Routing

# Contact Form Setup. Setup an account and copy over the key. When someone fills out the form, it will be received in your email.
formspree-key: https://formspree.io/f/{your-key}

# Active theme (Updatethis to switch themes). Make sure to keep the indentation the samne.
colors:
  text: "#1a1c20"
  border: "#ddd"
  link: "#4a76ee"
  highlight: "#0c0cf2"
  background: "#ffffff"
  light_background: "#f3f5fb"






#########################################################################################################
# Build settings for the site. Editing the below may cause the site to malfunction.

collections:
  projects:
    output: true
    permalink: /projects/:path/


markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1
      indent: 0

plugins:
  - jekyll-feed

include:
  - _projects


# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
